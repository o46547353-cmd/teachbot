version: '3.8'

services:
  bot:
    build: .
    container_name: edtech_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: edtech_postgres_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-edtech_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_pass}
      POSTGRES_DB: ${DB_NAME:-edtech_bot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edtech_user} -d ${DB_NAME:-edtech_bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: